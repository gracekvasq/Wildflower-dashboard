<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Dashboard</title>

<style>
body {font-family:Arial;background:#fdf8f0;padding:20px;}
button {margin:5px;padding:10px;}
table {width:100%;background:white;border-collapse:collapse;}
td,th {padding:8px;text-align:center;}
th {background:#2d5a27;color:white;}
</style>
</head>

<body>

<h1>Coach Dashboard</h1>

<button onclick="clearAll()">⚠️ Clear All Data</button>

<h2>Game Log</h2>
<table id="logTable">
<thead>
<tr><th>Player</th><th>AB</th><th>H</th><th>BB</th><th>TB</th><th>Date</th><th>Delete</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
let games = JSON.parse(localStorage.getItem("games")) || [];

function render(){
  const tbody = document.querySelector("#logTable tbody");
  tbody.innerHTML="";

  games.forEach((g,i)=>{
    const row = document.createElement("tr");
    row.innerHTML=`
      <td>${g.name}</td>
      <td>${g.AB}</td>
      <td>${g.H}</td>
      <td>${g.BB}</td>
      <td>${g.TB}</td>
      <td>${g.date}</td>
      <td><button onclick="del(${i})">❌</button></td>
    `;
    tbody.appendChild(row);
  });
}

function del(i){
  games.splice(i,1);
  localStorage.setItem("games", JSON.stringify(games));
  render();
}

function clearAll(){
  if(confirm("Delete ALL data?")){
    localStorage.removeItem("games");
    location.reload();
  }
}

render();
</script>

</body>
</html>
