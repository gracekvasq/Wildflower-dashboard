<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Stats</title>

<style>
body {font-family:Arial;background:#fdf8f0;padding:20px;}
form {max-width:400px;margin:auto;background:white;padding:20px;border-radius:10px;}
input,button {width:100%;margin:8px 0;padding:10px;}
button {background:#2d5a27;color:white;border:none;}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Coach Login</h2>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">
<h1>Enter Game Stats</h1>

<form id="form">
<input id="name" placeholder="Player Name" required>
<input id="AB" type="number" placeholder="AB" required>
<input id="H" type="number" placeholder="Hits" required>
<input id="BB" type="number" placeholder="Walks">
<input id="TB" type="number" placeholder="Total Bases">
<button>Save</button>
</form>
</div>

<script>
const PASS="wildflowers2026";

function login(){
  if(password.value===PASS){
    loginBox.style.display="none";
    app.style.display="block";
  } else alert("Wrong password");
}

form.onsubmit = e=>{
  e.preventDefault();

  const game={
    name:name.value,
    AB:+AB.value,
    H:+H.value,
    BB:+BB.value||0,
    TB:+TB.value||0,
    date:new Date().toLocaleDateString()
  };

  let games=JSON.parse(localStorage.getItem("games"))||[];
  games.push(game);
  localStorage.setItem("games",JSON.stringify(games));

  // GOOGLE SHEETS
  fetch("https://script.google.com/macros/s/AKfycbwki5xZEbrwBEBQCasJaOz2o7GCMwCGm0yipmQ3-L7eNu4pUcxqm4kALlK3ACCEf83q/exec",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(game)
  });

  alert("✅ Saved!");
  form.reset();
}
</script>

</body>
</html>
